spring.application.name=playlizt-content-api
server.port=${SERVER_PORT}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=playlizt_content
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Eureka Client Configuration
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Gemini AI Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=${GEMINI_MODEL:gemini-2.0-flash-exp}
gemini.api.fallback-models=${GEMINI_FALLBACK_MODELS:gemini-1.5-flash,gemini-1.5-pro}
gemini.api.max-tokens=${GEMINI_MAX_TOKENS:2048}
gemini.api.temperature=${GEMINI_TEMPERATURE:0.7}
gemini.api.rate-limit-rpm=${GEMINI_RATE_LIMIT_RPM:60}

# AI Provider Fallback Configuration
ai.provider.fallback-order=${AI_PROVIDER_FALLBACK_ORDER:gemini,nvidia,openrouter,openai}
ai.provider.nvidia.api-key=${NVIDIA_API_KEY:}
ai.provider.nvidia.model=${NVIDIA_MODEL:nvidia/llama-3.1-nemotron-70b-instruct}
ai.provider.nvidia.base-url=${NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1/chat/completions}
ai.provider.openrouter.api-key=${OPENROUTER_API_KEY:}
ai.provider.openrouter.model=${OPENROUTER_MODEL:openai/gpt-oss-120b}
ai.provider.openrouter.base-url=${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1/chat/completions}
ai.provider.openrouter.site-url=${OPENROUTER_SITE_URL:http://localhost:4080}
ai.provider.openrouter.app-name=${OPENROUTER_APP_NAME:Playlizt}
ai.provider.openai.api-key=${OPENAI_API_KEY:}
ai.provider.openai.model=${OPENAI_MODEL:gpt-4o-mini}
ai.provider.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1/chat/completions}

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# OpenAPI/Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Logging Configuration
logging.level.root=INFO
logging.level.zw.co.t3ratech.playlizt=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.file.name=/var/log/playlizt/playlizt-content-api.log

# File Upload Configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
